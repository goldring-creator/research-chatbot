name: Build desktop app

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # 수동 실행 버튼

permissions:
  contents: write   # Release에 빌드 파일 첨부 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ResearchChatbot-mac
          - os: windows-latest
            artifact: ResearchChatbot-windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller --noconfirm --windowed --name ResearchChatbot app.py

      - name: Zip (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r ../${{ matrix.artifact }}.zip ResearchChatbot.app

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/ResearchChatbot/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}.zip
